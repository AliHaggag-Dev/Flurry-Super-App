<!doctype html>
<html dir="rtl" lang="ar">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Auto-Recovery on Deployments (Failed Chunks/MIME mismatches) -->
  <script>
    window.addEventListener('error', function(e) {
      if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
        const url = e.target.src || e.target.href;
        if (url && (url.includes('/assets/') || url.includes('.js') || url.includes('.css'))) {
          console.warn('Detected failed asset load. Reloading client to update code...', url);
          const lastReload = sessionStorage.getItem('last-chunk-reload');
          const now = Date.now();
          if (!lastReload || (now - parseInt(lastReload, 10) > 10000)) {
            sessionStorage.setItem('last-chunk-reload', now);
            window.location.reload(true);
          }
        }
      }
    }, true);

    window.addEventListener('unhandledrejection', function(e) {
      const reason = e.reason && e.reason.message;
      if (reason && (
        reason.includes('Failed to fetch dynamically imported module') || 
        reason.includes('error loading dynamically imported module') ||
        reason.includes('ChunkLoadError')
      )) {
        console.warn('Detected dynamic module load failure. Reloading...', reason);
        const lastReload = sessionStorage.getItem('last-chunk-reload');
        const now = Date.now();
        if (!lastReload || (now - parseInt(lastReload, 10) > 10000)) {
          sessionStorage.setItem('last-chunk-reload', now);
          window.location.reload(true);
        }
      }
    });

    window.addEventListener('vite:preloadError', function(event) {
      console.warn('Detected Vite preload error. Reloading...', event);
      const lastReload = sessionStorage.getItem('last-chunk-reload');
      const now = Date.now();
      if (!lastReload || (now - parseInt(lastReload, 10) > 10000)) {
        sessionStorage.setItem('last-chunk-reload', now);
        window.location.reload(true);
      }
    });
  </script>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Flurry" />

  <link rel="preconnect" href="https://ik.imagekit.io" crossorigin />
  <link rel="dns-prefetch" href="https://ik.imagekit.io" />

  <link rel="preconnect" href="https://img.clerk.com" crossorigin />
  <link rel="dns-prefetch" href="https://img.clerk.com" />

  <link rel="preload" href="/fonts/outfit-v15-latin-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/outfit-v15-latin-700.woff2" as="font" type="font/woff2" crossorigin>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet">

  <meta name="description" content="Flurry - Share your moments with the world." />
  <title>Flurry | Connect with friends</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
